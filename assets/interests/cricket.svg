<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#1d3a26"/>
      <stop offset="55%" stop-color="#122117"/>
      <stop offset="100%" stop-color="#0a0f0b"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4d9a6"/>
      <stop offset="50%" stop-color="#e3b877"/>
      <stop offset="100%" stop-color="#b98a4a"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ff7a6e"/>
      <stop offset="60%" stop-color="#d93a30"/>
      <stop offset="100%" stop-color="#8f1d16"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <g fill="#eafff0" opacity="0.5">
    <circle cx="80" cy="90" r="2"/><circle cx="520" cy="140" r="1.6"/><circle cx="450" cy="60" r="2.2"/>
    <circle cx="150" cy="700" r="1.8"/><circle cx="540" cy="640" r="2"/><circle cx="60" cy="420" r="1.5"/>
  </g>
  <ellipse cx="300" cy="705" rx="215" ry="34" fill="#7dffa8" opacity="0.10"/>
  <ellipse cx="300" cy="705" rx="140" ry="20" fill="none" stroke="#7dffa8" stroke-opacity="0.35" stroke-width="2"/>
  <!-- stumps -->
  <g stroke="#8fe6ae" stroke-width="10" stroke-linecap="round" opacity="0.85" filter="url(#glow)">
    <line x1="258" y1="700" x2="258" y2="560"/>
    <line x1="300" y1="700" x2="300" y2="555"/>
    <line x1="342" y1="700" x2="342" y2="560"/>
    <line x1="252" y1="551" x2="296" y2="549"/>
    <line x1="304" y1="549" x2="348" y2="551"/>
  </g>
  <!-- bat -->
  <g transform="translate(268,340) rotate(-32)" filter="url(#glow)">
    <rect x="-16" y="-268" width="32" height="120" rx="14" fill="#3b2b52" stroke="#b590ff" stroke-width="3"/>
    <g stroke="#b590ff" stroke-width="2.5" opacity="0.8">
      <line x1="-14" y1="-244" x2="14" y2="-236"/>
      <line x1="-14" y1="-216" x2="14" y2="-208"/>
      <line x1="-14" y1="-188" x2="14" y2="-180"/>
    </g>
    <path d="M -52 -158 Q -52 -172 -36 -172 L 36 -172 Q 52 -172 52 -158 L 52 128 Q 52 176 0 176 Q -52 176 -52 128 Z" fill="url(#blade)" stroke="#ffe9c4" stroke-width="3"/>
    <line x1="0" y1="-150" x2="0" y2="150" stroke="#a3742f" stroke-width="4" opacity="0.55"/>
  </g>
  <!-- ball -->
  <g transform="translate(432,232)" filter="url(#glow)">
    <circle r="46" fill="url(#ball)" stroke="#ffb3a8" stroke-width="2.5"/>
    <path d="M -18 -42 Q -34 0 -18 42" fill="none" stroke="#ffe3dc" stroke-width="3.5"/>
    <path d="M 18 -42 Q 34 0 18 42" fill="none" stroke="#ffe3dc" stroke-width="3.5"/>
    <g stroke="#ffe3dc" stroke-width="2">
      <line x1="-22" y1="-30" x2="-30" y2="-26"/><line x1="-25" y1="-15" x2="-34" y2="-12"/>
      <line x1="-26" y1="0" x2="-36" y2="0"/><line x1="-25" y1="15" x2="-34" y2="12"/>
      <line x1="22" y1="-30" x2="30" y2="-26"/><line x1="25" y1="-15" x2="34" y2="-12"/>
      <line x1="26" y1="0" x2="36" y2="0"/><line x1="25" y1="15" x2="34" y2="12"/>
    </g>
  </g>
  <!-- motion arcs -->
  <g fill="none" stroke="#7dffa8" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <path d="M 480 160 Q 520 210 505 275"/>
    <path d="M 508 148 Q 556 208 538 288"/>
  </g>
</svg>
