<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#2a1b4d"/>
      <stop offset="55%" stop-color="#171030"/>
      <stop offset="100%" stop-color="#0b0817"/>
    </radialGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3a86"/>
      <stop offset="100%" stop-color="#241b45"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <g fill="#e6dcff" opacity="0.5">
    <circle cx="90" cy="110" r="2"/><circle cx="500" cy="80" r="1.7"/><circle cx="530" cy="620" r="2.2"/>
    <circle cx="70" cy="660" r="1.6"/><circle cx="300" cy="60" r="2"/>
  </g>
  <!-- floating pixels -->
  <g opacity="0.65">
    <rect x="120" y="580" width="16" height="16" fill="#66e0ff"/>
    <rect x="452" y="606" width="12" height="12" fill="#ff7ad9"/>
    <rect x="160" y="640" width="10" height="10" fill="#b590ff"/>
    <rect x="430" y="150" width="14" height="14" fill="#7dffa8"/>
  </g>
  <!-- gamepad -->
  <g transform="translate(300,390)" filter="url(#glow)">
    <path d="M -150 -95 L 150 -95 Q 205 -95 222 -20 Q 240 70 226 108 Q 212 146 176 132 Q 140 118 112 72 L -112 72 Q -140 118 -176 132 Q -212 146 -226 108 Q -240 70 -222 -20 Q -205 -95 -150 -95 Z"
          fill="url(#pad)" stroke="#b590ff" stroke-width="4"/>
    <!-- d-pad -->
    <g fill="#171030" stroke="#66e0ff" stroke-width="3">
      <rect x="-152" y="-42" width="30" height="84" rx="8"/>
      <rect x="-179" y="-15" width="84" height="30" rx="8"/>
    </g>
    <!-- buttons -->
    <circle cx="112" cy="-46" r="15" fill="#ffd166" stroke="#fff1c9" stroke-width="2.5"/>
    <circle cx="150" cy="-8" r="15" fill="#ff5a5f" stroke="#ffc2c4" stroke-width="2.5"/>
    <circle cx="74" cy="-8" r="15" fill="#7dffa8" stroke="#d2ffe3" stroke-width="2.5"/>
    <circle cx="112" cy="30" r="15" fill="#66e0ff" stroke="#cdf4ff" stroke-width="2.5"/>
    <!-- sticks -->
    <circle cx="-52" cy="34" r="24" fill="#171030" stroke="#b590ff" stroke-width="3"/>
    <circle cx="-52" cy="34" r="11" fill="#b590ff"/>
    <circle cx="52" cy="70" r="0" fill="none"/>
    <!-- menu buttons -->
    <rect x="-30" y="-52" width="22" height="9" rx="4.5" fill="#66e0ff" opacity="0.8"/>
    <rect x="8" y="-52" width="22" height="9" rx="4.5" fill="#66e0ff" opacity="0.8"/>
  </g>
  <!-- signal waves above -->
  <g fill="none" stroke="#66e0ff" stroke-linecap="round" opacity="0.6">
    <path d="M 268 218 Q 300 196 332 218" stroke-width="4"/>
    <path d="M 248 190 Q 300 156 352 190" stroke-width="4"/>
    <path d="M 228 162 Q 300 116 372 162" stroke-width="4"/>
  </g>
  <circle cx="300" cy="238" r="6" fill="#66e0ff" filter="url(#glow)"/>
</svg>
