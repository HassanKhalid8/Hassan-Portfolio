<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#402410"/>
      <stop offset="55%" stop-color="#241407"/>
      <stop offset="100%" stop-color="#100903"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <g fill="#ffe9c4" opacity="0.5">
    <circle cx="90" cy="110" r="2"/><circle cx="520" cy="90" r="1.8"/><circle cx="480" cy="680" r="2"/>
    <circle cx="80" cy="620" r="1.7"/><circle cx="310" cy="60" r="2"/>
  </g>
  <ellipse cx="300" cy="672" rx="200" ry="26" fill="#ffd166" opacity="0.10"/>
  <!-- bottom brick: red, 4 studs -->
  <g filter="url(#glow)">
    <rect x="130" y="560" width="340" height="104" rx="10" fill="#e03e36" stroke="#ff9d97" stroke-width="3"/>
    <g fill="#f0554d" stroke="#ff9d97" stroke-width="2.5">
      <rect x="152" y="536" width="56" height="24" rx="6"/>
      <rect x="234" y="536" width="56" height="24" rx="6"/>
      <rect x="316" y="536" width="56" height="24" rx="6"/>
      <rect x="398" y="536" width="56" height="24" rx="6"/>
    </g>
  </g>
  <!-- middle brick: yellow, 3 studs, offset -->
  <g filter="url(#glow)">
    <rect x="180" y="432" width="270" height="104" rx="10" fill="#f2b632" stroke="#ffe6a8" stroke-width="3"/>
    <g fill="#ffc94d" stroke="#ffe6a8" stroke-width="2.5">
      <rect x="204" y="408" width="56" height="24" rx="6"/>
      <rect x="288" y="408" width="56" height="24" rx="6"/>
      <rect x="372" y="408" width="56" height="24" rx="6"/>
    </g>
  </g>
  <!-- top brick: blue, 2 studs -->
  <g filter="url(#glow)">
    <rect x="222" y="304" width="186" height="104" rx="10" fill="#2f6fd6" stroke="#9cc4ff" stroke-width="3"/>
    <g fill="#4585e8" stroke="#9cc4ff" stroke-width="2.5">
      <rect x="248" y="280" width="56" height="24" rx="6"/>
      <rect x="330" y="280" width="56" height="24" rx="6"/>
    </g>
  </g>
  <!-- floating brick: green, drifting in -->
  <g transform="translate(410,180) rotate(14)" filter="url(#glow)">
    <rect x="-60" y="0" width="120" height="62" rx="8" fill="#3fae62" stroke="#a6f0c1" stroke-width="3"/>
    <g fill="#54c477" stroke="#a6f0c1" stroke-width="2.5">
      <rect x="-46" y="-18" width="38" height="18" rx="5"/>
      <rect x="8" y="-18" width="38" height="18" rx="5"/>
    </g>
  </g>
  <g transform="translate(155,212) rotate(-12)" filter="url(#glow)">
    <rect x="-46" y="0" width="92" height="52" rx="7" fill="#8a5cd6" stroke="#d4beff" stroke-width="3"/>
    <g fill="#9d73e3" stroke="#d4beff" stroke-width="2.5">
      <rect x="-32" y="-16" width="28" height="16" rx="4"/>
      <rect x="6" y="-16" width="28" height="16" rx="4"/>
    </g>
  </g>
</svg>
