<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#3d1b3f"/>
      <stop offset="55%" stop-color="#221028"/>
      <stop offset="100%" stop-color="#100813"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <g fill="#ffe3f6" opacity="0.5">
    <circle cx="80" cy="100" r="2"/><circle cx="510" cy="130" r="1.8"/><circle cx="460" cy="700" r="2"/>
    <circle cx="110" cy="640" r="1.6"/><circle cx="330" cy="70" r="2.1"/>
  </g>
  <!-- clapperboard -->
  <g transform="translate(300,290)" filter="url(#glow)">
    <!-- top stick, opened -->
    <g transform="translate(-128,-78) rotate(-18)">
      <rect x="0" y="-40" width="260" height="40" rx="8" fill="#1d1226" stroke="#ff7ad9" stroke-width="3"/>
      <g>
        <polygon points="18,-40 58,-40 40,0 0,0" fill="#ff7ad9"/>
        <polygon points="94,-40 134,-40 116,0 76,0" fill="#66e0ff"/>
        <polygon points="170,-40 210,-40 192,0 152,0" fill="#ffd166"/>
        <polygon points="238,-40 260,-40 260,-8 232,-8" fill="#b590ff"/>
      </g>
    </g>
    <!-- board -->
    <rect x="-128" y="-78" width="256" height="170" rx="12" fill="#241b45" stroke="#ff7ad9" stroke-width="3.5"/>
    <line x1="-128" y1="-38" x2="128" y2="-38" stroke="#ff7ad9" stroke-width="2" opacity="0.6"/>
    <g stroke="#8f7bb8" stroke-width="2.5" opacity="0.7">
      <line x1="-104" y1="-8" x2="20" y2="-8"/>
      <line x1="-104" y1="24" x2="60" y2="24"/>
      <line x1="-104" y1="56" x2="0" y2="56"/>
    </g>
    <!-- play button -->
    <circle cx="76" cy="34" r="34" fill="#ff7ad9" opacity="0.92"/>
    <polygon points="66,16 96,34 66,52" fill="#1d1226"/>
  </g>
  <!-- timeline -->
  <g transform="translate(0,520)" filter="url(#glow)">
    <rect x="70" y="0" width="460" height="10" rx="5" fill="#3a2b52" opacity="0.9"/>
    <g rx="9">
      <rect x="70" y="34" width="150" height="34" rx="9" fill="#66e0ff" opacity="0.85"/>
      <rect x="232" y="34" width="112" height="34" rx="9" fill="#ff7ad9" opacity="0.85"/>
      <rect x="356" y="34" width="174" height="34" rx="9" fill="#b590ff" opacity="0.85"/>
      <rect x="70" y="86" width="86" height="34" rx="9" fill="#ffd166" opacity="0.8"/>
      <rect x="168" y="86" width="196" height="34" rx="9" fill="#7dffa8" opacity="0.7"/>
      <rect x="376" y="86" width="120" height="34" rx="9" fill="#66e0ff" opacity="0.6"/>
    </g>
    <!-- audio waveform strip -->
    <g stroke="#ff7ad9" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <line x1="84" y1="146" x2="84" y2="166"/><line x1="98" y1="140" x2="98" y2="172"/>
      <line x1="112" y1="150" x2="112" y2="162"/><line x1="126" y1="136" x2="126" y2="176"/>
      <line x1="140" y1="146" x2="140" y2="166"/><line x1="154" y1="142" x2="154" y2="170"/>
      <line x1="168" y1="152" x2="168" y2="160"/><line x1="182" y1="138" x2="182" y2="174"/>
      <line x1="196" y1="148" x2="196" y2="164"/><line x1="210" y1="144" x2="210" y2="168"/>
      <line x1="224" y1="150" x2="224" y2="162"/><line x1="238" y1="140" x2="238" y2="172"/>
    </g>
    <!-- playhead -->
    <g>
      <line x1="300" y1="-14" x2="300" y2="186" stroke="#ffffff" stroke-width="3"/>
      <polygon points="290,-14 310,-14 300,2" fill="#ffffff"/>
    </g>
  </g>
</svg>
